# Integration test configuration — Postgres real + Flyway ativo.
# Usa o container mvt-events-db (porta 5436), base dedicada mvt-events-test.

spring.datasource.url=jdbc:postgresql://localhost:5436/mvt-events-test
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=mvt
spring.datasource.password=mvtpass

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none

# Schema é clonado previamente do DB de dev (via pg_dump) — Flyway desabilitado
# pra não tentar reaplicar migrations históricas que tiveram bugs ao longo do projeto.
spring.flyway.enabled=false

# JWT
jwt.secret=test-secret-key-for-junit-tests-only-not-for-production
jwt.expiration=3600000

# Logging mínimo
logging.level.org.springframework.web=ERROR
logging.level.org.hibernate=ERROR
logging.level.com.mvt.mvt_events=INFO
logging.level.org.flywaydb=WARN

spring.docker.compose.enabled=false
spring.test.database.replace=none
